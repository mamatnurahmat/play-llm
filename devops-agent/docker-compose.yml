version: "3.9"

services:

  # ─────────────────────────────────────────
  # Redis — conversation state & caching
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devops-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

  # ─────────────────────────────────────────
  # API — FastAPI + LangGraph + LiteLLM
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: devops-agent-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── LLM provider (pilih salah satu) ──
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # ── Optional: Ollama local ──
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-}
      # ── Redis ──
      REDIS_URL: redis://redis:6379
      # ── App ──
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./agent:/app/agent:ro
      - ./api:/app/api:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agent-net

  # ─────────────────────────────────────────
  # UI — Chat interface via Nginx
  # ─────────────────────────────────────────
  ui:
    image: nginx:alpine
    container_name: devops-agent-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - agent-net

  # ─────────────────────────────────────────
  # LiteLLM Proxy (opsional)
  # Uncomment untuk multi-provider gateway
  # ─────────────────────────────────────────
  # litellm-proxy:
  #   image: ghcr.io/berriai/litellm:main-latest
  #   container_name: devops-agent-litellm-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "4000:4000"
  #   volumes:
  #     - ./litellm_config.yaml:/app/config.yaml:ro
  #   command: --config /app/config.yaml --port 4000
  #   environment:
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #     ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  #   networks:
  #     - agent-net

volumes:
  redis_data:

networks:
  agent-net:
    driver: bridge

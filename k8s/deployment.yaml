apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          imagePullPolicy: Always
          command:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: litellm-secret
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: litellm_config.yaml
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
